apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: your-app-name:latest
        imagePullPolicy: Never        # Uses local Minikube image
        ports:
        - containerPort: 80           # Change to your app's port (3000, 8080, etc.)
