# ─── Frontend Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zamota-frontend
  labels:
    app: zamota-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zamota-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: zamota-frontend
    spec:
      containers:
        - name: frontend
          image: zamota-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ─── Frontend Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: zamota-frontend-svc
spec:
  selector:
    app: zamota-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
