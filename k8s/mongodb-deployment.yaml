# ─── MongoDB StatefulSet ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zamota-mongodb
spec:
  serviceName: zamota-mongodb-svc
  replicas: 1
  selector:
    matchLabels:
      app: zamota-mongodb
  template:
    metadata:
      labels:
        app: zamota-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "zamota"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ─── MongoDB Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: zamota-mongodb-svc
spec:
  selector:
    app: zamota-mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None   # Headless service for StatefulSet
