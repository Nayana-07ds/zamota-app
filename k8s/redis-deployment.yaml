# ─── Redis Deployment ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zamota-redis
  labels:
    app: zamota-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zamota-redis
  template:
    metadata:
      labels:
        app: zamota-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
# ─── Redis PVC ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
# ─── Redis Service ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: zamota-redis-svc
spec:
  selector:
    app: zamota-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
